---
- name: SSH Connectivity Check
  hosts: all
  gather_facts: no
  any_errors_fatal: true

  tasks:

    - name: Test SSH connectivity (ping module)
      ansible.builtin.ping:
      register: ping_result
      ignore_errors: yes

    - name: Test raw SSH connectivity if ping fails (no Python)
      ansible.builtin.raw: "echo ok"
      register: raw_result
      changed_when: false
      ignore_errors: yes
      when: ping_result is failed

    - name: Fail if both ping and raw SSH failed
      ansible.builtin.fail:
        msg: "Host {{ inventory_hostname }} is unreachable via SSH."
      when:
        - ping_result is failed
        - raw_result is failed

    - name: Report success
      ansible.builtin.debug:
        msg: "Host {{ inventory_hostname }} is reachable via SSH."
      when:
        - ping_result is succeeded or raw_result is succeeded
